name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node for HTML script checks
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run repository quality checks
        run: python scripts/quality_check.py
